<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Tareas</h1>
            <span id="pendingCount" class="badge">0 pendientes</span>
        </header>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="¿Qué hay que hacer?" autocomplete="off">
            <button id="addBtn" aria-label="Agregar tarea">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </div>

        <ul id="taskList"></ul>

        <footer class="footer">
            <button id="clearBtn" class="clear-btn">Borrar completadas</button>
        </footer>
    </div>

    <script type="module" src="modules/storage.js"></script>
    <script type="module" src="modules/tasks.js"></script>
    <script type="module" src="modules/ui.js"></script>
</body>
</html>
